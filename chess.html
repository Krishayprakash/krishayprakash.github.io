<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chess GUI</title>

<style>
body{
    margin:0;
    background:#222;
    color:white;
    font-family:Arial;
    text-align:center;
}

h1{
    margin:15px;
}

#board{
    display:grid;
    grid-template-columns:repeat(8,60px);
    width:480px;
    margin:20px auto;
    border:4px solid #555;
}

.square{
    width:60px;
    height:60px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
}

.light{background:#f0d9b5;}
.dark{background:#b58863;}

input,button,select{
    padding:10px;
    margin:5px;
    font-size:16px;
    border:none;
    border-radius:8px;
}

button{
    background:green;
    color:white;
    cursor:pointer;
}

#status{
    font-size:20px;
    margin:10px;
}

@media(max-width:600px){
    #board{
        width:320px;
        grid-template-columns:repeat(8,40px);
    }

    .square{
        width:40px;
        height:40px;
        font-size:26px;
    }
}
</style>
</head>
<body>

<h1>Chess Game</h1>

<input id="moveInput" placeholder="e2e4">
<button onclick="makeMove()">Move</button>

<h2 id="status">White to move</h2>

<div id="board"></div>

<!-- FIXED chess.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

<script>
const game = new Chess();

const symbols = {
wp:"♙", wr:"♖", wn:"♘",
wb:"♗", wq:"♕", wk:"♔",
bp:"♟", br:"♜", bn:"♞",
bb:"♝", bq:"♛", bk:"♚"
};

function drawBoard(){

    const boardDiv =
    document.getElementById("board");

    boardDiv.innerHTML = "";

    const board =
    game.board();

    for(let r=0;r<8;r++){

        for(let c=0;c<8;c++){

            const sq =
            document.createElement("div");

            sq.className =
            "square " +
            ((r+c)%2===0
            ? "light"
            : "dark");

            const piece =
            board[r][c];

            if(piece){

                const key =
                piece.color +
                piece.type;

                sq.textContent =
                symbols[key];
            }

            boardDiv.appendChild(sq);
        }
    }

    updateStatus();
}

function updateStatus(){

    let text = "";

    if(game.in_checkmate()){
        text = "Checkmate!";
    }
    else if(game.in_draw()){
        text = "Draw!";
    }
    else if(game.in_check()){
        text = "Check!";
    }
    else{
        text =
        game.turn()==="w"
        ? "White to move"
        : "Black to move";
    }

    document
    .getElementById("status")
    .textContent = text;
}

function makeMove(){

    const input =
    document
    .getElementById("moveInput")
    .value
    .trim()
    .toLowerCase();

    if(input.length !== 4){
        alert("Use e2e4");
        return;
    }

    const move =
    game.move({
        from:input.slice(0,2),
        to:input.slice(2,4),
        promotion:"q"
    });

    if(move === null){
        alert("Illegal move!");
        return;
    }

    document
    .getElementById("moveInput")
    .value = "";

    drawBoard();
}

document
.getElementById("moveInput")
.addEventListener("keydown",
e=>{
    if(e.key==="Enter"){
        makeMove();
    }
});

drawBoard();
</script>
</body>
