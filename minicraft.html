<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MiniCraft</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#87CEEB;
    font-family:Arial,sans-serif;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.5);
    color:white;
    padding:12px;
    border-radius:12px;
    z-index:10;
}

#crosshair{
    position:absolute;
    top:50%;
    left:50%;
    width:20px;
    height:20px;
    transform:translate(-50%,-50%);
    pointer-events:none;
}

#crosshair::before,
#crosshair::after{
    content:"";
    position:absolute;
    background:white;
}

#crosshair::before{
    width:2px;
    height:20px;
    left:9px;
}

#crosshair::after{
    width:20px;
    height:2px;
    top:9px;
}
</style>
</head>

<body>

<div id="ui">
Click Screen To Play<br>
WASD Move<br>
Mouse Look<br>
SPACE Jump<br>
Left Click Break<br>
Right Click Place
</div>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

// Lighting
const sunlight =
new THREE.DirectionalLight(
0xffffff,
1
);

sunlight.position.set(
10,20,10
);

scene.add(sunlight);

scene.add(
new THREE.AmbientLight(
0xffffff,
0.5
)
);

// Blocks
const blocks = [];

const geometry =
new THREE.BoxGeometry(1,1,1);

function createBlock(
x,y,z,color
){

const material =
new THREE.MeshLambertMaterial({
color
});

const cube =
new THREE.Mesh(
geometry,
material
);

cube.position.set(x,y,z);

scene.add(cube);

blocks.push(cube);

return cube;
}

// Terrain
for(let x=-25;x<25;x++){

for(let z=-25;z<25;z++){

let height =
Math.floor(
Math.sin(x*0.25)*2 +
Math.cos(z*0.25)*2
);

for(let y=-4;y<=height;y++){

let color = 0x888888;

if(y===height){
color = 0x4CAF50;
}
else if(y>height-2){
color = 0x8B4513;
}

createBlock(
x,y,z,color
);
}

// Trees
if(Math.random()<0.04){

for(let t=1;t<=4;t++){

createBlock(
x,
height+t,
z,
0x7B4B25
);
}

for(let lx=-2;lx<=2;lx++){
for(let lz=-2;lz<=2;lz++){

if(
Math.abs(lx)+
Math.abs(lz) < 4
){

createBlock(
x+lx,
height+5,
z+lz,
0x228B22
);
}
}
}
}
}
}

// Camera
camera.position.set(
0,5,10
);

// Controls
let yaw = 0;
let pitch = 0;

const keys = {};

document.addEventListener(
'keydown',
e=>{
keys[e.key.toLowerCase()]
= true;
});

document.addEventListener(
'keyup',
e=>{
keys[e.key.toLowerCase()]
= false;
});

// Pointer lock
document.body.addEventListener(
'click',
()=>{
document.body.requestPointerLock();
});

document.addEventListener(
'mousemove',
e=>{

if(
document.pointerLockElement
=== document.body
){

yaw -=
e.movementX * 0.002;

pitch -=
e.movementY * 0.002;

pitch = Math.max(
-Math.PI/2,
Math.min(
Math.PI/2,
pitch
)
);

camera.rotation.order =
"YXZ";

camera.rotation.y =
yaw;

camera.rotation.x =
pitch;
}
});

// Jumping
let velocityY = 0;
let grounded = false;

// Raycaster
const raycaster =
new THREE.Raycaster();

window.addEventListener(
'mousedown',
e=>{

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
);

const hits =
raycaster.intersectObjects(
blocks
);

if(hits.length > 0){

const hit = hits[0];

if(e.button === 0){

scene.remove(
hit.object
);

const index =
blocks.indexOf(
hit.object
);

if(index > -1){

blocks.splice(
index,
1
);
}
}

if(e.button === 2){

const normal =
hit.face.normal;

const pos =
hit.object.position
.clone()
.add(normal);

createBlock(
Math.round(pos.x),
Math.round(pos.y),
Math.round(pos.z),
0x4CAF50
);
}
}
});

window.addEventListener(
'contextmenu',
e=>e.preventDefault()
);

// Game loop
function animate(){

requestAnimationFrame(
animate
);

const speed = 0.12;

const forward =
new THREE.Vector3(
Math.sin(yaw),
0,
Math.cos(yaw)
);
);

const right =
new THREE.Vector3(
Math.cos(yaw),
0,
-Math.sin(yaw)
);

if(keys["w"]){

camera.position.add(
forward.clone()
.multiplyScalar(speed)
);
}

if(keys["s"]){

camera.position.add(
forward.clone()
.multiplyScalar(-speed)
);
}

if(keys["a"]){

camera.position.add(
right.clone()
.multiplyScalar(-speed)
);
}

if(keys["d"]){

camera.position.add(
right.clone()
.multiplyScalar(speed)
);
}

// Gravity
velocityY -= 0.01;

camera.position.y +=
velocityY;

if(camera.position.y < 3){

camera.position.y = 3;
velocityY = 0;
grounded = true;
}

if(
keys[" "] &&
grounded
){
velocityY = 0.22;
grounded = false;
}

renderer.render(
scene,
camera
);
}

animate();

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth/
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);
});
</script>

</body>
</html>
