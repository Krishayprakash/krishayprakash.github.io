<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MiniCraft - With Saving</title>
<style>
    body { margin: 0; overflow: hidden; background: #87CEEB; font-family: Arial, sans-serif; user-select: none; }
    #ui {
        position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white;
        padding: 12px; border-radius: 8px; z-index: 10; pointer-events: none; line-height: 1.4;
    }
    #notification {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.8); color: #0f0; padding: 15px 25px; border-radius: 8px;
        font-size: 18px; display: none; z-index: 20;
    }
    #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
    #crosshair::before, #crosshair::after { content: ""; position: absolute; background: white; }
    #crosshair::before { width: 2px; height: 20px; left: 9px; }
    #crosshair::after { width: 20px; height: 2px; top: 9px; }
    #selected {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; color: white;
        display: flex; align-items: center; gap: 12px; z-index: 10; font-size: 18px;
    }
</style>
</head>
<body>
<div id="ui">
    <strong>MiniCraft</strong><br>
    Click to lock mouse<br>
    WASD Move • Mouse Look • SPACE Jump<br>
    Left Click Break • Right Click Place<br>
    1-5 Select Block<br>
    <strong>S</strong> = Save • <strong>L</strong> = Load • <strong>R</strong> = Reset
</div>
<div id="crosshair"></div>
<div id="selected">Selected: <span id="blockName" style="font-weight:bold">Grass</span></div>
<div id="notification"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// =============== SETUP ===============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.022);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.DirectionalLight(0xffffff, 1.1));
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// =============== BLOCKS ===============
const blockMap = new Map();
const geometry = new THREE.BoxGeometry(1, 1, 1);

const BLOCK_TYPES = {
    grass:  { color: 0x4CAF50, name: "Grass" },
    dirt:   { color: 0x8B5A2B, name: "Dirt" },
    stone:  { color: 0x777777, name: "Stone" },
    wood:   { color: 0xA0522D, name: "Wood" },
    leaves: { color: 0x228B22, name: "Leaves" }
};

function getKey(x, y, z) { return `${Math.floor(x)},${Math.floor(y)},${Math.floor(z)}`; }

function createBlock(x, y, z, type = 'grass') {
    const key = getKey(x, y, z);
    if (blockMap.has(key)) return;
    
    const material = new THREE.MeshLambertMaterial({ color: BLOCK_TYPES[type].color });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(x, y, z);
    mesh.userData.type = type;
    
    scene.add(mesh);
    blockMap.set(key, mesh);
}

function removeBlock(mesh) {
    if (!mesh) return;
    const key = getKey(mesh.position.x, mesh.position.y, mesh.position.z);
    blockMap.delete(key);
    scene.remove(mesh);
}

// =============== WORLD GENERATION ===============
function generateWorld() {
    blockMap.forEach(mesh => scene.remove(mesh));
    blockMap.clear();

    for (let x = -35; x <= 35; x++) {
        for (let z = -35; z <= 35; z++) {
            const height = Math.floor(Math.sin(x*0.08)*2.5 + Math.cos(z*0.08)*2.5 + 3);
            
            for (let y = -4; y <= height; y++) {
                if (y === height) createBlock(x, y, z, 'grass');
                else if (y >= height - 2) createBlock(x, y, z, 'dirt');
                else createBlock(x, y, z, 'stone');
            }

            if (Math.random() < 0.045) {
                const th = 5;
                for (let i = 1; i <= th; i++) createBlock(x, height + i, z, 'wood');
                for (let lx = -2; lx <= 2; lx++)
                for (let lz = -2; lz <= 2; lz++)
                for (let ly = 3; ly <= 6; ly++) {
                    if (Math.random() > 0.25) 
                        createBlock(x + lx, height + ly, z + lz, 'leaves');
                }
            }
        }
    }
}

generateWorld();

// =============== SAVE / LOAD ===============
function saveWorld() {
    const data = [];
    blockMap.forEach((mesh) => {
        data.push({
            x: Math.floor(mesh.position.x),
            y: Math.floor(mesh.position.y),
            z: Math.floor(mesh.position.z),
            type: mesh.userData.type
        });
    });
    
    localStorage.setItem('minicraft_save', JSON.stringify(data));
    showNotification("World Saved!", "#0f0");
}

function loadWorld() {
    const saved = localStorage.getItem('minicraft_save');
    if (!saved) {
        showNotification("No saved world found!", "#ff0");
        return;
    }
    
    const data = JSON.parse(saved);
    blockMap.forEach(mesh => scene.remove(mesh));
    blockMap.clear();

    data.forEach(b => createBlock(b.x, b.y, b.z, b.type));
    showNotification("World Loaded!", "#0f0");
}

function showNotification(text, color) {
    const notif = document.getElementById('notification');
    notif.textContent = text;
    notif.style.color = color;
    notif.style.display = 'block';
    setTimeout(() => notif.style.display = 'none', 2000);
}

// =============== PLAYER & CONTROLS ===============
camera.position.set(8, 15, 8);
let yaw = -Math.PI/4, pitch = 0;
const keys = {};
let velocityY = 0;
let onGround = false;

document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    
    if (e.key.toLowerCase() === 's') saveWorld();
    if (e.key.toLowerCase() === 'l') loadWorld();
    if (e.key.toLowerCase() === 'r') {
        if (confirm("Reset world to default?")) generateWorld();
    }
});

document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

document.body.addEventListener('click', () => document.body.requestPointerLock());

document.addEventListener('mousemove', e => {
    if (document.pointerLockElement) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;
        pitch = Math.max(-1.55, Math.min(1.55, pitch));
        camera.rotation.set(pitch, yaw, 0);
    }
});

// Block Selection
let selectedType = 'grass';
const blockOrder = ['grass','dirt','stone','wood','leaves'];
document.addEventListener('keydown', e => {
    if (e.key >= '1' && e.key <= '5') {
        selectedType = blockOrder[e.key - 1];
        document.getElementById('blockName').textContent = BLOCK_TYPES[selectedType].name;
    }
});

// Raycaster & Highlight
const raycaster = new THREE.Raycaster();
let highlight = null;

function updateHighlight() {
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(Array.from(blockMap.values()));
    if (highlight) highlight.material.emissive?.set(0x000000);
    highlight = (hits.length > 0 && hits[0].distance < 8) ? hits[0].object : null;
    if (highlight) highlight.material.emissive?.set(0x555555);
}

// Collision
function isColliding(pos) {
    for (let x = Math.floor(pos.x - 0.35); x <= Math.floor(pos.x + 0.35); x++) {
        for (let y = Math.floor(pos.y - 1.7); y <= Math.floor(pos.y + 0.2); y++) {
            for (let z = Math.floor(pos.z - 0.35); z <= Math.floor(pos.z + 0.35); z++) {
                if (blockMap.has(getKey(x, y, z))) return true;
            }
        }
    }
    return false;
}

// Interactions
window.addEventListener('mousedown', e => {
    if (!document.pointerLockElement) return;
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(Array.from(blockMap.values()));
    
    if (hits.length > 0 && hits[0].distance < 8) {
        const hit = hits[0];
        if (e.button === 0) removeBlock(hit.object);
        else if (e.button === 2) {
            const pos = hit.object.position.clone().add(hit.face.normal);
            if (pos.distanceTo(camera.position) > 1.6) {
                createBlock(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z), selectedType);
            }
        }
    }
});
window.addEventListener('contextmenu', e => e.preventDefault());

// =============== GAME LOOP ===============
function animate() {
    requestAnimationFrame(animate);

    const speed = 0.22;
    const move = new THREE.Vector3();
    if (keys['w']) move.z -= 1;
    if (keys['s']) move.z += 1;
    if (keys['a']) move.x -= 1;
    if (keys['d']) move.x += 1;

    if (move.length() > 0) {
        move.normalize().applyAxisAngle(new THREE.Vector3(0,1,0), yaw).multiplyScalar(speed);
        camera.position.x += move.x;
        if (isColliding(camera.position)) camera.position.x -= move.x;
        camera.position.z += move.z;
        if (isColliding(camera.position)) camera.position.z -= move.z;
    }

    velocityY -= 0.022;
    camera.position.y += velocityY;
    if (isColliding(camera.position)) {
        camera.position.y -= velocityY;
        velocityY = 0;
        onGround = true;
    } else onGround = false;

    if (keys[' '] && onGround) {
        velocityY = 0.32;
        onGround = false;
    }

    if (camera.position.y < -40) camera.position.set(8, 20, 8);

    updateHighlight();
    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
